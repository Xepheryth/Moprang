<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <!DOCTYPE html>
  <html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - KANS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      /* Small overrides for login page */
      .auth-container{ max-width:420px; margin:60px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 6px 30px rgba(0,0,0,0.08);} 
      .auth-tabs{ display:flex; gap:8px; margin-bottom:12px; }
      .auth-tabs button{ flex:1; padding:8px; border-radius:6px; border:1px solid #e6c86a; background:#fff; cursor:pointer; }
      .auth-tabs button.active{ background:linear-gradient(135deg,#FFD700,#FFA500); color:#fff; border:none; }
      .auth-form{ display:none; }
      .auth-form.active{ display:block; }
      .small-note{ font-size:13px; color:#666; text-align:center; margin-top:10px; }
      .link-like{ color:#FFA500; cursor:pointer; text-decoration:none; }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <h2 style="text-align:center; color:#FFA500; margin-bottom:6px;">KANS - Masuk</h2>
      <div class="auth-tabs">
        <button id="tab-login" class="active">Login</button>
        <button id="tab-register">Register</button>
      </div>

      <div id="login-form" class="auth-form active">
        <div class="form-row">
          <input type="text" id="lg-username" placeholder="Username" required>
        </div>
        <div class="form-row">
          <input type="password" id="lg-password" placeholder="Password" required>
        </div>
        <div class="form-row">
          <button id="btn-login">Login</button>
        </div>
        <div class="small-note">Belum punya akun? <a id="goto-register" class="link-like">Daftar sekarang</a></div>
      </div>

      <div id="register-form" class="auth-form">
        <div class="form-row">
          <input type="text" id="rg-username" placeholder="Username" required>
        </div>
        <div class="form-row">
          <input type="email" id="rg-email" placeholder="Email" required>
        </div>
        <div class="form-row">
          <input type="password" id="rg-password" placeholder="Password (min 8 char, uppercase, lowercase, number)" required>
        </div>
        <div class="form-row">
          <input type="password" id="rg-password2" placeholder="Konfirmasi Password" required>
        </div>
        <div class="form-row">
          <button id="btn-register">Daftar</button>
        </div>
        <div class="small-note">Sudah punya akun? <a id="goto-login" class="link-like">Masuk</a></div>
      </div>

      <!-- Email Confirmation Form -->
      <div id="confirmation-form" class="auth-form">
        <p style="text-align:center; color:#666; margin-bottom:16px;">
          Konfirmasi email Anda di bawah. Kode konfirmasi telah dikirim ke email Anda.
        </p>
        <div class="form-row">
          <input type="text" id="conf-code" placeholder="Masukkan 6-digit code" maxlength="6" required>
        </div>
        <div class="form-row">
          <button id="btn-confirm">Konfirmasi Email</button>
        </div>
        <div class="small-note">Tidak menerima code? <a id="resend-code" class="link-like">Kirim ulang</a></div>
      </div>
    </div>

    <script>
    (function(){
      // Use HTTP for localhost, adjust if backend is available
      const API_BASE = true ? null : 'http://localhost:3000/api'; // Set to null to use localStorage only
      const DEBUG = true;

      // UI tabs
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin = document.getElementById('login-form');
      const formRegister = document.getElementById('register-form');
      const formConfirmation = document.getElementById('confirmation-form');
      const gotoRegister = document.getElementById('goto-register');
      const gotoLogin = document.getElementById('goto-login');

      function showLogin(){ tabLogin.classList.add('active'); tabRegister.classList.remove('active'); formLogin.classList.add('active'); formRegister.classList.remove('active'); formConfirmation.classList.remove('active'); }
      function showRegister(){ tabRegister.classList.add('active'); tabLogin.classList.remove('active'); formRegister.classList.add('active'); formLogin.classList.remove('active'); formConfirmation.classList.remove('active'); }
      function showConfirmation(){ formConfirmation.classList.add('active'); formLogin.classList.remove('active'); formRegister.classList.remove('active'); tabLogin.classList.remove('active'); tabRegister.classList.remove('active'); }
      tabLogin.addEventListener('click', showLogin);
      tabRegister.addEventListener('click', showRegister);
      gotoRegister.addEventListener('click', showRegister);
      gotoLogin.addEventListener('click', showLogin);

      // Store pending registration for confirmation
      let pendingConfirmation = { username: '', email: '', password: '', code: '' };

      // Local storage helpers
      function getUsersLocal(){ 
        try{ 
          const data = localStorage.getItem('kans_users');
          if (!data) {
            // Initialize with demo account if empty
            const seedUsers = [
              { username: 'admin', email: 'admin@kans.local', password: 'Kans2025', verified: true, confirmationCode: '' },
              { username: 'demo', email: 'demo@kans.local', password: 'Demo123456', verified: true, confirmationCode: '' }
            ];
            localStorage.setItem('kans_users', JSON.stringify(seedUsers));
            if(DEBUG) console.log('✓ Initialized with seed accounts:', seedUsers);
            return seedUsers;
          }
          const users = JSON.parse(data);
          // Ensure admin account has correct credentials
          const adminUser = users.find(u => u.username === 'admin');
          if (adminUser) {
            adminUser.password = 'Kans2025';
            adminUser.verified = true;
            localStorage.setItem('kans_users', JSON.stringify(users));
            if(DEBUG) console.log('✓ Admin password updated to: Kans2025');
          }
          return users;
        }catch(e){
          if(DEBUG) console.error('Error parsing users:', e);
          return [];
        } 
      }
      
      function saveUsersLocal(users){ 
        try {
          localStorage.setItem('kans_users', JSON.stringify(users)); 
          if(DEBUG) console.log('✓ Saved users to localStorage');
        } catch(e) {
          if(DEBUG) console.error('Error saving users:', e);
        }
      }

      function generateConfirmationCode(){
        return Math.floor(100000 + Math.random() * 900000).toString();
      }

      async function postJSON(url, body){
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            timeout: 5000
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          return res.json();
        } catch(err) {
          if(DEBUG) console.error('postJSON error:', err.message);
          throw err;
        }
      }

      async function registerRemote(username, email, password){
        if (!API_BASE) throw new Error('Backend not configured');
        const url = `${API_BASE.replace(/\/$/, '')}/register`;
        return postJSON(url, { username, email, password });
      }
      
      async function loginRemote(username, password){
        if (!API_BASE) throw new Error('Backend not configured');
        const url = `${API_BASE.replace(/\/$/, '')}/login`;
        return postJSON(url, { username, password });
      }

      async function registerUser(username, email, password){
        if(DEBUG) console.log('Attempting registration for:', username);
        
        // Try backend first if configured
        if(API_BASE){
          try{ 
            if(DEBUG) console.log('Trying remote register...');
            const r = await registerRemote(username,email,password); 
            if(DEBUG) console.log('Remote register success:', r);
            return r; 
          }catch(err){ 
            if(DEBUG) console.warn('Remote register failed:', err.message, '- fallback to local');
          }
        }
        
        // Fallback to localStorage
        const users = getUsersLocal();
        if(users.find(u=>u.username===username)) {
          return { success:false, message:'Username sudah terdaftar' };
        }
        
        // Generate confirmation code
        const confirmationCode = generateConfirmationCode();
        users.push({ username, email, password, verified: false, confirmationCode });
        saveUsersLocal(users);
        
        // Show confirmation form and inform user
        if(DEBUG) console.log('✓ User registered, confirmation code:', confirmationCode);
        alert('Registrasi berhasil! Kode konfirmasi telah ditampilkan di layar. Silakan masukkan kode untuk melanjutkan.');
        
        return { success:true, message:'Registrasi berhasil, silakan konfirmasi email', code: confirmationCode, username };
      }

      async function loginUser(username, password){
        if(DEBUG) console.log('Attempting login for:', username);
        
        // Try backend first if configured
        if(API_BASE){
          try{ 
            if(DEBUG) console.log('Trying remote login...');
            const r = await loginRemote(username,password); 
            if(DEBUG) console.log('Remote login success:', r);
            return r; 
          }catch(err){ 
            if(DEBUG) console.warn('Remote login failed:', err.message, '- fallback to local');
          }
        }
        
        // Fallback to localStorage
        const users = getUsersLocal();
        if(DEBUG) console.log('Available local users:', users.map(u => u.username));
        
        const found = users.find(u=>u.username===username && u.password===password);
        if(!found) {
          if(DEBUG) console.log('Login failed: user not found or password mismatch');
          return { success:false, message: 'Username atau password salah' };
        }
        
        // Check if email is verified
        if(!found.verified) {
          if(DEBUG) console.log('Login failed: email not verified for user:', username);
          return { success:false, message: 'Email belum dikonfirmasi. Silakan verifikasi email Anda terlebih dahulu.' };
        }
        
        if(DEBUG) console.log('✓ Local login successful for:', username);
        return { success:true, message:'Login berhasil (mode lokal)', username };
      }

      function validatePasswordStrength(password){
        if(password.length < 8) return { ok: false, msg: 'Password minimal 8 karakter' };
        if(!/[A-Z]/.test(password)) return { ok: false, msg: 'Password harus mengandung huruf besar' };
        if(!/[a-z]/.test(password)) return { ok: false, msg: 'Password harus mengandung huruf kecil' };
        if(!/[0-9]/.test(password)) return { ok: false, msg: 'Password harus mengandung angka' };
        return { ok: true };
      }

      // Register handler
      document.getElementById('btn-register').addEventListener('click', async function(e){
        e.preventDefault();
        const u = document.getElementById('rg-username').value.trim();
        const em = document.getElementById('rg-email').value.trim();
        const p = document.getElementById('rg-password').value;
        const p2 = document.getElementById('rg-password2').value;
        if(!u || !em || !p){ alert('Semua field diperlukan'); return; }
        if(p !== p2){ alert('Password dan konfirmasi tidak sama'); return; }
        const pwc = validatePasswordStrength(p);
        if(!pwc.ok){ alert(pwc.msg); return; }
        const res = await registerUser(u, em, p);
        if(res && res.success){
          // Store pending confirmation info
          pendingConfirmation = { username: u, email: em, password: p, code: res.code };
          
          // Reset form
          document.getElementById('rg-username').value = '';
          document.getElementById('rg-email').value = '';
          document.getElementById('rg-password').value = '';
          document.getElementById('rg-password2').value = '';
          document.getElementById('conf-code').value = '';
          
          // Show confirmation form with code (for demo purposes)
          const codeDisplay = document.createElement('div');
          codeDisplay.style.cssText = 'padding:12px; margin-bottom:12px; background:#fff3e0; border:1px solid #ffb74d; border-radius:6px; text-align:center;';
          codeDisplay.innerHTML = '<strong>Kode Konfirmasi Anda:</strong><br><span style="font-size:24px; font-weight:bold; color:#ff6b00; letter-spacing:4px;">' + res.code + '</span>';
          
          // Insert code display into confirmation form
          const confForm = document.getElementById('confirmation-form');
          const existingDisplay = confForm.querySelector('[id="code-display"]');
          if(existingDisplay) existingDisplay.remove();
          
          const displayDiv = document.createElement('div');
          displayDiv.id = 'code-display';
          displayDiv.innerHTML = codeDisplay.innerHTML;
          displayDiv.style.cssText = codeDisplay.style.cssText;
          
          confForm.insertBefore(displayDiv, confForm.firstChild);
          
          // Show confirmation form
          showConfirmation();
          if(DEBUG) console.log('✓ Showing confirmation form with code:', res.code);
        }
        else { alert(res.message || 'Gagal registrasi'); }
      });

      // Confirmation handler
      document.getElementById('btn-confirm').addEventListener('click', function(e){
        e.preventDefault();
        const inputCode = document.getElementById('conf-code').value.trim();
        
        if(!inputCode){ alert('Masukkan kode konfirmasi'); return; }
        if(inputCode !== pendingConfirmation.code){ 
          alert('Kode konfirmasi salah'); 
          return; 
        }
        
        // Mark user as verified
        const users = getUsersLocal();
        const userIdx = users.findIndex(u => u.username === pendingConfirmation.username);
        if(userIdx >= 0){
          users[userIdx].verified = true;
          users[userIdx].confirmationCode = '';
          saveUsersLocal(users);
          if(DEBUG) console.log('✓ User email verified:', pendingConfirmation.username);
        }
        
        // Auto-login
        alert('✓ Email Anda berhasil dikonfirmasi! Anda akan diarahkan ke halaman utama.');
        localStorage.setItem('kans_current', pendingConfirmation.username);
        window.location.href = 'Front.html';
      });

      // Resend code handler
      document.getElementById('resend-code').addEventListener('click', function(e){
        e.preventDefault();
        if(!pendingConfirmation.code){
          alert('Tidak ada registrasi yang pending');
          return;
        }
        alert('Kode konfirmasi dikirim ulang:\n\n' + pendingConfirmation.code + '\n\nSilakan gunakan kode ini untuk mengonfirmasi email.');
      });

      // Login handler
      document.getElementById('btn-login').addEventListener('click', async function(e){
        e.preventDefault();
        const u = document.getElementById('lg-username').value.trim();
        const p = document.getElementById('lg-password').value;
        if(!u || !p){ alert('Username dan password diperlukan'); return; }
        const res = await loginUser(u,p);
        if(res && res.success){
          if(res.token) localStorage.setItem('kans_token', res.token);
          if(res.role) localStorage.setItem('kans_role', res.role);
          localStorage.setItem('kans_current', res.username || u);
          window.location.href = 'Front.html';
        } else {
          alert(res.message || 'Login gagal. Silakan cek console untuk detail.');
        }
      });

      // If already logged in, go to main
      try{
        if(localStorage.getItem('kans_current') || localStorage.getItem('kans_token')){
          window.location.href = 'Front.html';
        }
      }catch(e){}
      
      // Initialize seed data on first load
      if(DEBUG) console.log('KANS Login System initialized. Demo accounts created if needed.');
    })();
    </script>
  </body>
  </html>
