<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Area Detail - KANS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <img src="media/logo-kans.png" style="height:45px; vertical-align:left;">
        <nav class="navbar">
          <ul class="nav-menu">
            <li><a href="project-detail.html" class="nav-link" >Kembali</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-content" style="padding:24px;">
      <h2 id="area-title" style="margin-bottom:12px;">Area</h2>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div style="display:flex; gap:8px;">
          <button id="documents-area-btn" style="background:#3498db; border:none; color:#fff; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.08);">📄 Dokumen Pengadaan</button>
        </div>
        <div style="margin-left:auto; position:relative;">
          <button id="area-menu-btn" aria-haspopup="true" aria-expanded="false" title="Menu" style="background:#fff; border:1px solid #ffd700; color:#333; padding:8px 10px; border-radius:8px; cursor:pointer; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.08);">⋮</button>
          <div id="area-menu" style="display:none; position:absolute; right:0; top:44px; background:#fff; border:1px solid #ddd; border-radius:6px; box-shadow:0 6px 18px rgba(0,0,0,0.12); z-index:120; min-width:140px; overflow:hidden;">
            <button id="edit-area-btn" style="display:block; width:100%; text-align:left; padding:10px 12px; background:transparent; border:0; cursor:pointer;">Edit Area</button>
            <button id="delete-area-btn" style="display:block; width:100%; text-align:left; padding:10px 12px; background:transparent; border:0; cursor:pointer; color:#b00;">Hapus Area</button>
          </div>
        </div>
      </div>
      <div id="area-info" style="margin-top:16px;"></div>

      <section style="margin-top:18px;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;">
          <h3 style="margin:0;">Daftar Item :</h3>
          <div style="display:flex; gap:8px; align-items:center;">
            <label for="supplier-filter" style="font-size:13px; font-weight:600; color:#666;">Filter Supplier:</label>
            <select id="supplier-filter" style="padding:6px 10px; border:1px solid #ddd; border-radius:4px; font-size:13px; background:#fff; cursor:pointer;">
              <option value="">-- Semua Supplier --</option>
            </select>
          </div>
        </div>
        <div id="items-list" style="margin-top:8px; margin-right:4px;"></div>
        <div id="add-item-section" style="margin-top:12px; display:grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap:8px; align-items:center;">
          <input id="new-item-name" placeholder="Nama item baru" style="padding:8px; border:1px solid #ddd; border-radius:4px;" />
          <input id="new-item-volume" placeholder="Volume" style="padding:8px; border:1px solid #ddd; border-radius:4px; text-align:right;" />
          <input id="new-item-unit" placeholder="Satuan" style="padding:8px; border:1px solid #ddd; border-radius:4px;" />
          <input id="new-item-delivery-date" type="date" placeholder="Tgl Pengiriman" style="padding:8px; border:1px solid #ddd; border-radius:4px;" />
          <input id="new-item-supplier" placeholder="Supplier" style="padding:8px; border:1px solid #ddd; border-radius:4px;" />
          <button id="add-item-btn" class="project-action-btn secondary" style="padding:8px 12px; white-space:nowrap;">Tambah Item</button>
        </div>
      </section>

      <!-- Modal Edit Area -->
      <div id="edit-area-modal" class="modal-overlay" aria-hidden="true" style="display:none;">
        <div class="modal-floating" role="dialog" aria-modal="true" aria-labelledby="edit-area-title">
          <h3 id="edit-area-title">Edit Area</h3>
          <form id="edit-area-form">
            <div class="form-row">
              <input type="text" id="edit-area-name" placeholder="Nama Area" required>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn cancel" id="cancel-edit-area-btn">Batal</button>
              <button type="submit" class="btn primary">Simpan</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Modal Tambah Area Baru -->
      <div id="add-area-new-modal" class="modal-overlay" aria-hidden="true" style="display:none;">
        <div class="modal-floating" role="dialog" aria-modal="true" aria-labelledby="add-area-new-title">
          <h3 id="add-area-new-title">Tambah Area Baru</h3>
          <form id="add-area-new-form">
            <div class="form-row">
              <input type="text" id="new-area-name" placeholder="Nama Area Baru" required>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn cancel" id="cancel-add-area-new-btn">Batal</button>
              <button type="submit" class="btn primary">Tambah</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Modal Dokumen Pengadaan Area -->
      <div id="documents-modal" class="modal-overlay" aria-hidden="true" style="display:none; z-index:1001;">
        <div class="modal-floating" role="dialog" aria-modal="true" aria-labelledby="documents-title" style="width:60vw; max-width:1400px; max-height:75vh; overflow-y:auto; position:relative;">
          <button type="button" id="close-documents-modal-btn" style="position:absolute; top:12px; right:16px; background:none; border:none; font-size:28px; cursor:pointer; color:#999; padding:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">×</button>
          <h3 id="documents-title" style="margin-bottom:20px;"><span id="documents-area-name"></span></h3>
          
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px;" id="documents-grid">
            <!-- Document cards will be inserted here -->
          </div>
        </div>
      </div>

      <!-- Modal Detail Item / PO -->
      <div id="item-detail-modal" class="modal-overlay" aria-hidden="true" style="display:none; z-index:1001;">
        <div class="modal-floating" role="dialog" aria-modal="true" aria-labelledby="item-detail-title" style="max-width:800px; max-height:90vh; overflow-y:auto; position:relative;">
          <button type="button" id="close-item-detail-btn" style="position:absolute; top:12px; right:16px; background:none; border:none; font-size:28px; cursor:pointer; color:#999; padding:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">×</button>
          <h3 id="item-detail-title" style="margin-bottom:20px;">Detail Item/PO</h3>

          <form id="item-detail-form">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Nama Barang *</label>
                <input type="text" id="detail-item-name" placeholder="Nama barang" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
              </div>
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Satuan *</label>
                <input type="text" id="detail-item-unit" placeholder="Satuan (pcs, box, dll)" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
              </div>
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Supplier *</label>
                <input type="text" id="detail-item-supplier" placeholder="Nama Supplier" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
              </div>
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Client *</label>
                <input type="text" id="detail-item-client" placeholder="Nama Client" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
              </div>
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Volume</label>
                <input type="number" id="detail-item-volume" placeholder="Volume" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
              </div>
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Tanggal Pengiriman</label>
                <input type="date" id="detail-item-date" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
              </div>
              <div class="form-row">
                <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Status Pengadaan</label>
                <select id="detail-item-status" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; font-family:Arial;">
                  <option value="">-- Pilih Status --</option>
                </select>
              </div>
            </div>

            <!-- Edit Realisasi Section -->
            <div style="border-top:2px solid #ffd700; padding-top:16px; margin-top:16px;">
              <h4 style="margin:0 0 12px 0; color:#333; font-size:14px;">📦 Edit Realisasi</h4>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="form-row">
                  <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Jumlah Terkirim</label>
                  <input type="number" id="detail-item-terkirim" placeholder="Jumlah yang sudah terkirim" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
                </div>
                <div class="form-row">
                  <label style="display:block; font-weight:bold; margin-bottom:4px; font-size:12px;">Realisasi (%)</label>
                  <div style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; background:#f9f9f9; display:flex; align-items:center; font-weight:bold; color:#27ae60;">
                    <span id="detail-realisasi-percent">0%</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-row" style="margin-top:16px;">
              <label style="display:block; font-weight:bold; margin-bottom:8px;">Note</label>
              <textarea id="detail-item-note" placeholder="Masukkan catatan tambahan..." style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; font-family:Arial; min-height:80px; resize:vertical;"></textarea>
            </div>

            <div class="modal-actions" style="margin-top:24px;">
              <button type="button" class="btn cancel" id="cancel-item-detail-btn">Batal</button>
              <button type="submit" class="btn primary">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js?v=20260225-15"></script>
  <script>
    // admin check: only these usernames may add/edit/delete (fallback)
    function isAdminUser(){ try{ const cur = localStorage.getItem('kans_current'); return cur === 'admin' || cur === 'admin2'; }catch(e){ return false; } }
    function getQueryParam(name){
      const p = new URLSearchParams(window.location.search);
      return p.get(name);
    }
    function openModal(modal){ if(modal){ modal.style.display='flex'; modal.setAttribute('aria-hidden','false'); const first=modal.querySelector('input'); if(first)first.focus(); } }
    function closeModal(modal){ if(modal){ modal.style.display='none'; modal.setAttribute('aria-hidden','true'); } }

    // Define procurement status stages at the top
    const statusStages = ['PO dibuat', 'Supplier konfirmasi', 'Produksi/ready stock', 'Pengiriman', 'Diterima client', 'Selesai/komplain'];
    const statusColors = {
      'PO dibuat': '#3498db',
      'Supplier konfirmasi': '#9b59b6',
      'Produksi/ready stock': '#e74c3c',
      'Pengiriman': '#f39c12',
      'Diterima client': '#27ae60',
      'Selesai/komplain': '#2c3e50'
    };

    const projectName = getQueryParam('project') || localStorage.getItem('kans_current_project');
    const areaName = getQueryParam('area') || localStorage.getItem('kans_current_area');
    
    // Declare areaObj at this scope so it's accessible to all functions
    let areaObj = null;

    const titleEl = document.getElementById('area-title');
    const infoEl = document.getElementById('area-info');
    const itemsEl = document.getElementById('items-list');
    const newItemInput = document.getElementById('new-item-name');
    const addItemBtn = document.getElementById('add-item-btn');
    const deleteAreaBtn = document.getElementById('delete-area-btn');
    const editAreaBtn = document.getElementById('edit-area-btn');
    const addAreaBtn = document.getElementById('add-area-btn');
    const editAreaModal = document.getElementById('edit-area-modal');
    const editAreaForm = document.getElementById('edit-area-form');
    const cancelEditAreaBtn = document.getElementById('cancel-edit-area-btn');
    const editAreaNameInput = document.getElementById('edit-area-name');
    const addAreaNewModal = document.getElementById('add-area-new-modal');
    const addAreaNewForm = document.getElementById('add-area-new-form');
    const cancelAddAreaNewBtn = document.getElementById('cancel-add-area-new-btn');
    const newAreaNameInput = document.getElementById('new-area-name');

    if(!projectName || !areaName){
      titleEl.textContent = 'Data tidak lengkap';
      infoEl.innerHTML = '<p style="color:#999;">Project atau Area tidak ditentukan.</p>';
      console.error('Area detail error: projectName=' + projectName + ', areaName=' + areaName);
    } else {
      titleEl.textContent = areaName + ' — ' + projectName;
      const map = JSON.parse(localStorage.getItem('kans_project_areas') || '{}');
      const areaList = map[projectName] || [];
      console.log('Looking for area:', areaName, 'in project:', projectName);
      console.log('Available areas:', areaList.map(a => a.name));
      areaObj = areaList.find(a=>a.name===areaName);
      if(!areaObj){
        infoEl.innerHTML = '<p style="color:#999;">Area tidak ditemukan. Data: ' + JSON.stringify({projectName, areaName, areaListCount: areaList.length}) + '</p>';
        console.error('Area object not found:', {projectName, areaName, areaListCount: areaList.length});
      } else {
        // normalize old items (strings) to object shape {name,volume,unit,terkirim,realisasi,status}
        try{
          if (Array.isArray(areaObj.items) && areaObj.items.length && typeof areaObj.items[0] === 'string'){
            areaObj.items = areaObj.items.map(n => ({ name: n, volume: '', unit: '', terkirim: '', realisasi: '', status: statusStages[0] }));
            map[projectName] = areaList;
            localStorage.setItem('kans_project_areas', JSON.stringify(map));
          } else if (Array.isArray(areaObj.items) && areaObj.items.length && typeof areaObj.items[0] === 'object' && !areaObj.items[0].hasOwnProperty('realisasi')){
            areaObj.items = areaObj.items.map(it => ({ ...it, terkirim: it.terkirim || '', realisasi: it.realisasi || '', status: it.status || statusStages[0] }));
            map[projectName] = areaList;
            localStorage.setItem('kans_project_areas', JSON.stringify(map));
          } else if (Array.isArray(areaObj.items) && areaObj.items.length && typeof areaObj.items[0] === 'object' && !areaObj.items[0].hasOwnProperty('status')){
            areaObj.items = areaObj.items.map(it => ({ ...it, status: it.status || statusStages[0] }));
            map[projectName] = areaList;
            localStorage.setItem('kans_project_areas', JSON.stringify(map));
          }
        }catch(e){}

        infoEl.innerHTML = `<p><strong>Jumlah item:</strong> ${areaObj.items.length}</p>`;

        function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        function openInlineEditor(index){
          const row = itemsEl.querySelector(`tr[data-index="${index}"]`);
          if(!row) return;
          const it = areaObj.items[index] || {name:'',volume:'',unit:'',supplier:'',terkirim:'',realisasi:'',status:'',tanggal_pengiriman:'',note:''};
          // remove existing editor rows
          const existing = itemsEl.querySelector('.editor-row'); if(existing) existing.remove();
          const editor = document.createElement('tr');
          editor.className = 'editor-row';
          const currentStatus = it.status || statusStages[0];
          const statusOptions = statusStages.map(s => `<option value="${s}" ${s === currentStatus ? 'selected' : ''}>${s}</option>`).join('');
          editor.innerHTML = `<td></td><td style="padding:8px;"><input class="edit-name" value="${escapeHtml(it.name)}" style="width:95%; padding:6px;" /></td><td style="padding:8px;"><input class="edit-volume" value="${escapeHtml(it.volume)}" style="width:90%; padding:6px; text-align:center;" /></td><td style="padding:8px;"><input class="edit-unit" value="${escapeHtml(it.unit)}" style="width:90%; padding:6px; text-align:center;" /></td><td style="padding:8px;"><input class="edit-supplier" value="${escapeHtml(it.supplier)}" style="width:90%; padding:6px; text-align:center;" /></td><td style="padding:8px;"><input class="edit-realisasi" value="${escapeHtml(it.realisasi)}" style="width:90%; padding:6px; text-align:center;" /></td><td style="padding:8px;"><input class="edit-date" type="date" value="${escapeHtml(it.tanggal_pengiriman)}" style="width:100%; padding:6px; text-align:center;" /></td><td style="padding:8px;"><select class="edit-status" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ddd;">${statusOptions}</select></td><td style="padding:8px;"><input class="edit-note" value="${escapeHtml(it.note)}" style="width:95%; padding:6px;" /></td><td style="padding:8px; text-align:right;"><button class="save-edit" style="padding:6px 8px; background:#ffd700; border:0; border-radius:6px; margin-right:6px;">Simpan</button><button class="cancel-edit" style="padding:6px 8px; background:#ccc; border:0; border-radius:6px;">Batal</button></td>`;
          row.parentNode.insertBefore(editor, row.nextSibling);
          const saveBtn = editor.querySelector('.save-edit');
          const cancelBtn = editor.querySelector('.cancel-edit');
          saveBtn.addEventListener('click', function(ev){
            ev.stopPropagation();
            if(!isAdminUser()){ alert('Akses ditolak: hanya admin yang dapat mengubah item.'); return; }
            const newName = editor.querySelector('.edit-name').value.trim();
            const newVol = editor.querySelector('.edit-volume').value.trim();
            const newUnit = editor.querySelector('.edit-unit').value.trim();
            const newSupplier = editor.querySelector('.edit-supplier').value.trim();
            const newRealisasi = editor.querySelector('.edit-realisasi').value.trim();
            const newDate = editor.querySelector('.edit-date').value.trim();
            const newStatus = editor.querySelector('.edit-status').value.trim();
            const newNote = editor.querySelector('.edit-note').value.trim();
            if(!newName){ alert('Nama item tidak boleh kosong'); return; }
            if(window.useServer){
              // find project -> area -> items, then update by item id (best-effort by index)
              fetch('/api/projects').then(r=>r.json()).then(pd=>{
                const proj = pd.projects && pd.projects.find(p=>p.name===projectName);
                if(!proj) return alert('Project tidak ditemukan di server');
                fetch(`/api/projects/${proj.id}/areas`).then(r=>r.json()).then(ad=>{
                  const area = ad.areas && ad.areas.find(a=>a.name===areaName);
                  if(!area) return alert('Area tidak ditemukan di server');
                  fetch(`/api/areas/${area.id}/items`).then(r=>r.json()).then(itemsResp=>{
                    const existingItem = itemsResp.items && itemsResp.items[index];
                    if(existingItem && existingItem.id){
                      fetch(`/api/items/${existingItem.id}`, { method:'PUT', headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + (localStorage.getItem('kans_token')||'') }, body: JSON.stringify({ name: newName, volume: newVol, unit: newUnit, supplier: newSupplier, realisasi: newRealisasi, status: newStatus, tanggal_pengiriman: newDate, note: newNote }) })
                      .then(r=>r.json()).then(resp=>{ if(resp && resp.success){ renderItemsAndUpdateFilter(); } else alert('Gagal menyimpan item'); }).catch(err=>alert('Gagal menyimpan item: '+err.message));
                    } else {
                      // fallback to local
                      areaObj.items[index] = { ...areaObj.items[index], name: newName, volume: newVol, unit: newUnit, supplier: newSupplier, realisasi: newRealisasi, status: newStatus, tanggal_pengiriman: newDate, note: newNote };
                      map[projectName] = areaList;
                      localStorage.setItem('kans_project_areas', JSON.stringify(map));
                      renderItemsAndUpdateFilter();
                    }
                  }).catch(()=>alert('Gagal mengambil items'));
                }).catch(()=>alert('Gagal mengambil areas'));
              }).catch(()=>alert('Gagal mengakses server'));
              return;
            }
            areaObj.items[index] = { ...areaObj.items[index], name: newName, volume: newVol, unit: newUnit, supplier: newSupplier, realisasi: newRealisasi, status: newStatus, tanggal_pengiriman: newDate, note: newNote };
            map[projectName] = areaList;
            localStorage.setItem('kans_project_areas', JSON.stringify(map));
            renderItemsAndUpdateFilter();
          });
          cancelBtn.addEventListener('click', function(ev){ ev.stopPropagation(); editor.remove(); });
        }

        function getStatusBadgeHtml(status) {
          const color = statusColors[status] || '#999';
          return `<span class="status-badge" style="background:${color}; color:#fff; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:bold;">${status}</span>`;
        }

        // Supplier filter logic
        let currentSupplierFilter = '';
        const supplierFilterEl = document.getElementById('supplier-filter');
        
        function populateSupplierDropdown() {
          const suppliers = new Set();
          areaObj.items.forEach(it => {
            if(it.supplier && it.supplier.trim()) suppliers.add(it.supplier.trim());
          });
          const supplierOptions = Array.from(suppliers).sort();
          if(supplierOptions.length > 0) {
            supplierFilterEl.innerHTML = '<option value="">-- Semua Supplier --</option>' + 
              supplierOptions.map(s => `<option value="${s}">${s}</option>`).join('');
          }
        }

        // Removed: Form "Daftar Item" is now always visible
        // Previously hidden when area had no items, now always shown for user convenience

        function renderItemsAndUpdateFilter() {
          renderItems();
          populateSupplierDropdown();
        }

        if(supplierFilterEl) {
          supplierFilterEl.addEventListener('change', function(e) {
            currentSupplierFilter = this.value;
            renderItems();
          });
        }

        function renderItems(){
          if(!Array.isArray(areaObj.items) || areaObj.items.length === 0){
            itemsEl.innerHTML = '<p style="color:#999;">Belum ada item.</p>';
            return;
          }
          
          // Filter items berdasarkan supplier yang dipilih
          const filteredItems = currentSupplierFilter 
            ? areaObj.items.filter(it => it.supplier === currentSupplierFilter)
            : areaObj.items;
          
          if(filteredItems.length === 0) {
            itemsEl.innerHTML = '<p style="color:#999;">Tidak ada item dari supplier ini.</p>';
            return;
          }
          
          let html = '<table style="width:100%; border-collapse:collapse;">';
          html += '<thead><tr style="background:rgba(245,245,245,0.15); border-bottom:2px solid #ffd700;"><th style="width:48px; text-align:center; padding:8px;">NO</th><th style="min-width:120px; text-align:left; padding:8px;">NAMA BARANG</th><th style="flex:1; min-width:80px; text-align:center; padding:8px;">VOLUME</th><th style="flex:1; min-width:80px; text-align:center; padding:8px;">SATUAN</th><th style="flex:1; min-width:100px; text-align:center; padding:8px;">SUPPLIER</th><th style="flex:1; min-width:100px; text-align:center; padding:8px;">TGL PENGIRIMAN</th><th style="flex:1; min-width:90px; text-align:center; padding:8px;">REALISASI</th><th style="flex:1; min-width:100px; text-align:left; padding:8px;">STATUS</th><th style="flex:2; min-width:200px; text-align:left; padding:8px;">NOTE</th><th style="flex:0 0 auto; width:50px; padding:4px;"></th></tr></thead><tbody>';
          let totalRealisasi = 0;
          let countRealisasi = 0;
          let displayNum = 1;
          filteredItems.forEach((it, idx) =>{
            const actualIdx = areaObj.items.indexOf(it);
            const realisasi = (it.volume && it.terkirim) ? ((parseFloat(it.terkirim) / parseFloat(it.volume)) * 100).toFixed(2) : null;
            if(realisasi !== null) { totalRealisasi += parseFloat(realisasi); countRealisasi++; }
            const realisasiDisplay = realisasi !== null ? realisasi + '%' : '-';
            const currentStatus = it.status || statusStages[0];
            const statusIndex = statusStages.indexOf(currentStatus);
            html += `<tr style="border-bottom:1px solid #eee; background:rgba(255,255,255,0.05); vertical-align:top;" data-index="${actualIdx}">`;
            html += `<td style="padding:8px; text-align:center; font-weight:bold; font-size:12px;">${displayNum}</td>`;
            html += `<td style="padding:8px; font-weight:500; font-size:13px;">${escapeHtml(it.name || '')}</td>`;
            html += `<td style="padding:8px; text-align:center; font-size:12px; flex:1;">${escapeHtml(it.volume || '-')}</td>`;
            html += `<td style="padding:8px; text-align:center; font-size:12px; flex:1;">${escapeHtml(it.unit || '-')}</td>`;
            html += `<td style="padding:8px; text-align:center; font-size:12px; flex:1;">${escapeHtml(it.supplier || '-')}</td>`;
            html += `<td style="padding:8px; text-align:center; font-size:12px; flex:1;">${it.tanggal_pengiriman ? new Date(it.tanggal_pengiriman).toLocaleDateString('id-ID') : '-'}</td>`;
            html += `<td style="padding:8px; text-align:center; font-size:12px; flex:1;">${realisasiDisplay}</td>`;
            html += `<td style="padding:8px; font-size:12px; flex:1;">${getStatusBadgeHtml(currentStatus)}</td>`;
            html += `<td style="padding:8px; font-size:12px; flex:2; word-break:break-word; white-space:normal; line-height:1.4;" title="${escapeHtml(it.note || '')}">${escapeHtml(it.note || '-')}</td>`;
            html += `<td style="padding:4px; text-align:center; flex:0 0 auto; width:50px;">`;
            // Only show action menu for admin users
            if(isAdminUser()){
              html += `<button class="item-menu-btn" data-index="${actualIdx}" style="padding:6px; background:#fff; color:#333; border:1px solid #ccc; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold;">⋮</button>`;
            }
            html += `</td>`;
            html += '</tr>';
            displayNum++;
          });
          const avgRealisasi = countRealisasi > 0 ? (totalRealisasi / countRealisasi).toFixed(2) + '%' : '-';
          html += `<tr style="border-top:2px solid #ffd700; background:rgba(255,250,205,0.15); font-weight:bold;"><td colspan="8" style="padding:8px; text-align:right;">TOTAL REALISASI:</td><td style="padding:8px; text-align:right;">${avgRealisasi}</td></tr>`;;
          html += '</tbody></table>';
          itemsEl.innerHTML = html;

          itemsEl.querySelectorAll('.item-menu-btn').forEach(btn=>{
            btn.addEventListener('click', function(e){
              e.stopPropagation();
              const index = parseInt(this.getAttribute('data-index'));
              if(isNaN(index)) return;
              
              // Remove any existing menu
              const existingMenu = document.querySelector('.item-menu-dropdown');
              if(existingMenu) existingMenu.remove();
              
              // Create menu dropdown
              const menu = document.createElement('div');
              menu.className = 'item-menu-dropdown';
              menu.style.cssText = 'position:absolute; background:#fff; border:1px solid #ddd; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.1); z-index:1000; min-width:100px;';
              
              const editOption = document.createElement('button');
              editOption.textContent = 'Edit';
              editOption.style.cssText = 'display:block; width:100%; padding:8px 12px; text-align:left; background:none; border:none; cursor:pointer; font-size:12px; color:#333;';
              editOption.addEventListener('click', ()=>{ openItemDetail(index); menu.remove(); });
              
              const deleteOption = document.createElement('button');
              deleteOption.textContent = 'Hapus';
              deleteOption.style.cssText = 'display:block; width:100%; padding:8px 12px; text-align:left; background:none; border:none; cursor:pointer; font-size:12px; color:#f44336; border-top:1px solid #eee;';
              deleteOption.addEventListener('click', ()=>{ 
                if(!confirm('Hapus item ini?')) return;
                if(window.useServer){ /* server delete logic */ }
                areaObj.items.splice(index,1);
                map[projectName] = areaList;
                localStorage.setItem('kans_project_areas', JSON.stringify(map));
                renderItemsAndUpdateFilter();
                infoEl.innerHTML = `<p><strong>Jumlah item:</strong> ${areaObj.items.length}</p>`;
                menu.remove();
              });
              
              menu.appendChild(editOption);
              menu.appendChild(deleteOption);
              
              const rect = this.getBoundingClientRect();
              menu.style.top = (rect.bottom + window.scrollY) + 'px';
              menu.style.left = (rect.right - 100 + window.scrollX) + 'px';
              document.body.appendChild(menu);
              
              // Close menu when clicking elsewhere
              setTimeout(()=>{
                document.addEventListener('click', function closeMenu(e){
                  if(!menu.contains(e.target) && e.target !== btn) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                  }
                });
              }, 0);
            });
          });




        }
        
        renderItemsAndUpdateFilter();
        
        // Hide add-item section if user is not admin
        const addItemSection = document.getElementById('add-item-section');
        if(addItemSection){
          if(!isAdminUser()){
            addItemSection.style.display = 'none';
            console.log('ℹ Add-item section hidden: user is not admin');
          } else {
            addItemSection.style.display = 'flex';
            console.log('✓ Add-item section visible: user is admin');
          }
        }

        addItemBtn.addEventListener('click', function(){
          if(!isAdminUser()){ alert('Akses ditolak: hanya admin yang dapat menambah item.'); return; }
          const name = (document.getElementById('new-item-name').value||'').trim();
          const unit = (document.getElementById('new-item-unit').value||'').trim();
          if(!name || !unit){ alert('Isi nama dan satuan item'); return; }
          
          // Create new item with all required fields
          const newItem = {
            name: name,
            unit: unit,
            volume: (document.getElementById('new-item-volume').value||'').trim(),
            supplier: (document.getElementById('new-item-supplier').value||'').trim(),
            tanggal_pengiriman: (document.getElementById('new-item-delivery-date').value||'').trim(),
            terkirim: '',
            realisasi: '',
            status: statusStages[0],
            client: '',
            note: '',
            documents: {}
          };
          
          areaObj.items.push(newItem);
          map[projectName] = areaList;
          localStorage.setItem('kans_project_areas', JSON.stringify(map));
          
          // Clear inputs
          document.getElementById('new-item-name').value = '';
          document.getElementById('new-item-volume').value = '';
          document.getElementById('new-item-unit').value = '';
          document.getElementById('new-item-delivery-date').value = '';
          document.getElementById('new-item-supplier').value = '';
          
          // Render and open detail modal for new item
          renderItemsAndUpdateFilter();
          infoEl.innerHTML = `<p><strong>Jumlah item:</strong> ${areaObj.items.length}</p>`;
          setTimeout(() => {
            openItemDetail(areaObj.items.length - 1);
          }, 100);
        });

        deleteAreaBtn.addEventListener('click', function(){
          if(!isAdminUser()){ alert('Akses ditolak: hanya admin yang dapat menghapus area.'); return; }
          if(window.useServer){
            if(!confirm('Hapus area "' + areaName + '" dari project "' + projectName + '"?')) return;
            fetch('/api/projects').then(r=>r.json()).then(pd=>{
              const proj = pd.projects && pd.projects.find(p=>p.name===projectName);
              if(!proj) return alert('Project tidak ditemukan di server');
              fetch(`/api/projects/${proj.id}/areas`).then(r=>r.json()).then(ad=>{
                const area = ad.areas && ad.areas.find(a=>a.name===areaName);
                if(!area) return alert('Area tidak ditemukan di server');
                fetch(`/api/areas/${area.id}`, { method:'DELETE', headers: { Authorization: 'Bearer ' + (localStorage.getItem('kans_token')||'') } })
                .then(r=>r.json()).then(resp=>{ if(resp && resp.success){ alert('Area dihapus'); window.location.href = 'Front.html?open=areas&project=' + encodeURIComponent(projectName); } else alert('Gagal menghapus area'); }).catch(err=>alert('Gagal menghapus: '+err.message));
              }).catch(()=>alert('Gagal mengambil areas'));
            }).catch(()=>alert('Gagal mengakses server'));
            return;
          }
          console.log('Delete area button clicked for area:', areaName, 'in project:', projectName);
          if(!confirm('Hapus area "' + areaName + '" dari project "' + projectName + '"?')) { 
            console.log('Delete cancelled by user');
            return; 
          }
          console.log('✓ User confirmed deletion');
          const idx = areaList.findIndex(a=>a.name===areaName);
          console.log('Area index in areaList:', idx);
          if(idx>=0){ 
            console.log('✓ Splicing area at index', idx);
            areaList.splice(idx,1); 
            console.log('✓ After splice, areaList length:', areaList.length);
            map[projectName]=areaList; 
            console.log('✓ Updated map[' + projectName + ']:', map[projectName].length, 'areas');
            localStorage.setItem('kans_project_areas', JSON.stringify(map)); 
            console.log('✓ Saved to localStorage');
            alert('Area dihapus'); 
            console.log('✓ About to redirect to Front.html');
            window.location.href = 'Front.html?open=areas&project=' + encodeURIComponent(projectName); 
          } else {
            console.error('❌ Area "' + areaName + '" not found in areaList!');
          }
        });

        // Edit Area
        editAreaBtn.addEventListener('click', function(){ if(!isAdminUser()){ alert('Akses ditolak: hanya admin yang dapat mengubah area.'); return; } openModal(editAreaModal); editAreaNameInput.value = areaName; });
        if(cancelEditAreaBtn) cancelEditAreaBtn.addEventListener('click', function(){ closeModal(editAreaModal); });
        if(editAreaForm){
          editAreaForm.addEventListener('submit', function(e){
            e.preventDefault();
            const newName = (editAreaNameInput.value||'').trim();
            if(!newName){ alert('Nama area tidak boleh kosong'); return; }
            if(newName === areaName){ closeModal(editAreaModal); return; } // no change
            const idx = areaList.findIndex(a=>a.name===areaName);
            if(idx>=0){
              areaList[idx].name = newName;
              map[projectName] = areaList;
              localStorage.setItem('kans_project_areas', JSON.stringify(map));
              localStorage.setItem('kans_current_area', newName);
              alert('Area diubah menjadi "' + newName + '"');
              window.location.href = 'area-detail.html?project=' + encodeURIComponent(projectName) + '&area=' + encodeURIComponent(newName);
            }
          });
        }

        // Add Area Baru
        addAreaBtn && addAreaBtn.addEventListener('click', function(){ if(!isAdminUser()){ alert('Akses ditolak: hanya admin yang dapat menambah area.'); return; } openModal(addAreaNewModal); });
        if(cancelAddAreaNewBtn) cancelAddAreaNewBtn.addEventListener('click', function(){ closeModal(addAreaNewModal); });
        if(addAreaNewForm){
          addAreaNewForm.addEventListener('submit', function(e){
            e.preventDefault();
            const newAreaName = (newAreaNameInput.value||'').trim();
            if(!newAreaName){ alert('Nama area tidak boleh kosong'); return; }
            if(areaList.find(a=>a.name===newAreaName)){ alert('Area dengan nama ini sudah ada'); return; }
            areaList.push({ name: newAreaName, items: [] });
            map[projectName] = areaList;
            localStorage.setItem('kans_project_areas', JSON.stringify(map));
            alert('Area baru berhasil ditambahkan');
            addAreaNewForm.reset();
            closeModal(addAreaNewModal);
            window.location.href = 'area-detail.html?project=' + encodeURIComponent(projectName) + '&area=' + encodeURIComponent(newAreaName);
          });
        }

        // Close modals on overlay click
        if(editAreaModal) editAreaModal.addEventListener('click', function(e){ if(e.target===editAreaModal) closeModal(editAreaModal); });
        if(addAreaNewModal) addAreaNewModal.addEventListener('click', function(e){ if(e.target===addAreaNewModal) closeModal(addAreaNewModal); });

        // Item Detail Modal
        (function setupItemDetailModal(){
          const modal = document.getElementById('item-detail-modal');
          const form = document.getElementById('item-detail-form');
          const closeBtn = document.getElementById('close-item-detail-btn');
          const cancelBtn = document.getElementById('cancel-item-detail-btn');
          let currentItemIndex = -1;

          function openItemDetail(itemIndex){
            if(!isAdminUser()){ alert('Akses ditolak: hanya admin yang dapat mengedit item.'); return; }
            currentItemIndex = itemIndex;
            const item = areaObj.items[itemIndex] || {};
            
            document.getElementById('detail-item-name').value = item.name || '';
            document.getElementById('detail-item-unit').value = item.unit || '';
            document.getElementById('detail-item-supplier').value = item.supplier || '';
            document.getElementById('detail-item-client').value = item.client || '';
            document.getElementById('detail-item-volume').value = item.volume || '';
            document.getElementById('detail-item-date').value = item.tanggal_pengiriman || '';
            document.getElementById('detail-item-note').value = item.note || '';
            document.getElementById('detail-item-terkirim').value = item.terkirim || '';
            
            // Update realisasi percentage
            updateRealisasiDisplay();
            
            // Populate status dropdown
            const statusSelect = document.getElementById('detail-item-status');
            statusSelect.innerHTML = '';
            statusStages.forEach(stage => {
              const option = document.createElement('option');
              option.value = stage;
              option.textContent = stage;
              statusSelect.appendChild(option);
            });
            statusSelect.value = item.status || statusStages[0];
            
            openModal(modal);
          }

          function updateRealisasiDisplay(){
            const volume = parseFloat(document.getElementById('detail-item-volume').value) || 0;
            const terkirim = parseFloat(document.getElementById('detail-item-terkirim').value) || 0;
            let realisasiPercent = 0;
            if(volume > 0){
              realisasiPercent = Math.round((terkirim / volume) * 100);
            }
            document.getElementById('detail-realisasi-percent').textContent = realisasiPercent + '%';
            return realisasiPercent;
          }
          window.openItemDetail = openItemDetail;

          if(closeBtn) closeBtn.addEventListener('click', function(){ closeModal(modal); });
          if(cancelBtn) cancelBtn.addEventListener('click', function(){ closeModal(modal); });
          
          // Add event listeners untuk real-time realisasi calculation
          const volumeInput = document.getElementById('detail-item-volume');
          const terkirimInput = document.getElementById('detail-item-terkirim');
          if(volumeInput) volumeInput.addEventListener('input', updateRealisasiDisplay);
          if(terkirimInput) terkirimInput.addEventListener('input', updateRealisasiDisplay);
          
          if(form){
            form.addEventListener('submit', function(e){
              e.preventDefault();
              const item = areaObj.items[currentItemIndex];
              item.name = document.getElementById('detail-item-name').value.trim();
              item.unit = document.getElementById('detail-item-unit').value.trim();
              item.supplier = document.getElementById('detail-item-supplier').value.trim();
              item.client = document.getElementById('detail-item-client').value.trim();
              item.volume = document.getElementById('detail-item-volume').value.trim();
              item.tanggal_pengiriman = document.getElementById('detail-item-date').value.trim();
              item.note = document.getElementById('detail-item-note').value.trim();
              item.terkirim = document.getElementById('detail-item-terkirim').value.trim();
              item.status = document.getElementById('detail-item-status').value.trim() || statusStages[0];
              
              // Calculate realisasi percentage
              const volume = parseFloat(item.volume) || 0;
              const terkirim = parseFloat(item.terkirim) || 0;
              if(volume > 0){
                item.realisasi = Math.round((terkirim / volume) * 100) + '%';
              } else {
                item.realisasi = '0%';
              }
              
              map[projectName] = areaList;
              localStorage.setItem('kans_project_areas', JSON.stringify(map));
              closeModal(modal);
              renderItemsAndUpdateFilter();
              alert('Item berhasil disimpan');
            });
          }

          if(modal) modal.addEventListener('click', function(e){ if(e.target===modal) closeModal(modal); });
        })();

        // Documents Modal Setup
        (function setupDocumentsModal(){
          const docsModal = document.getElementById('documents-modal');
          const docsGrid = document.getElementById('documents-grid');
          const docsAreaName = document.getElementById('documents-area-name');
          const closeDocsBtn = document.getElementById('close-documents-modal-btn');
          const docsAreaBtn = document.getElementById('documents-area-btn');

          function buildDocumentsGrid(){
            docsAreaName.textContent = areaName;
            docsGrid.innerHTML = '';
            
            const documentTypes = ['PO', 'Invoice', 'Surat Jalan', 'BAPP', 'BASTB', 'Dokumentasi'];
            documentTypes.forEach(docType => {
              const docDiv = document.createElement('div');
              docDiv.style.cssText = 'border:1px solid #ddd; padding:16px; border-radius:6px; background:#f9f9f9;';
              const uploadSection = isAdminUser() ? `
                  <!-- Upload Section (Admin Only) -->
                  <div>
                    <div style="display:flex; gap:8px; align-items:stretch;">
                      <button type="button" class="choose-file-btn" data-doctype="${docType}" style="flex:1; padding:8px 12px; background:#ff6b6b; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold; white-space:nowrap;">📁 Pilih File</button>
                      <button type="button" class="upload-doc-area-btn" data-doctype="${docType}" style="flex:1; padding:8px 12px; background:#27ae60; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:12px; white-space:nowrap; font-weight:bold;">📤 Upload</button>
                      <input type="file" id="file-${docType}" style="display:none;">
                    </div>
                  </div>
              ` : '';
              docDiv.innerHTML = `
                <div>
                  <label style="display:block; font-weight:bold; font-size:14px; margin-bottom:12px; color:#333;">${docType}</label>
                  
                  <!-- Document Display Section -->
                  <div id="doc-list-${docType}" style="font-size:12px; color:#666; margin-bottom:16px; padding:10px; background:#fff; border-radius:4px; border:1px solid #eee; min-height:32px; display:flex; align-items:center; justify-content:space-between;">
                    <span>Belum ada dokumen</span>
                  </div>
                  ${uploadSection}
                </div>
              `;
              docsGrid.appendChild(docDiv);
            });

            // Add upload handlers
            docsGrid.querySelectorAll('.upload-doc-area-btn').forEach(btn => {
              btn.addEventListener('click', function(e){
                e.preventDefault();
                if(!isAdminUser()){ alert('Akses ditolak'); return; }
                const docType = this.getAttribute('data-doctype');
                const fileInput = document.getElementById(`file-${docType}`);
                const file = fileInput.files[0];
                if(!file){ alert('Pilih file terlebih dahulu'); return; }
                
                // Create file reader to convert file to base64
                const reader = new FileReader();
                reader.onload = function(event){
                  const base64 = event.target.result;
                  if(!areaObj.areaDocuments){
                    areaObj.areaDocuments = {};
                  }
                  areaObj.areaDocuments[docType] = {
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    data: base64,
                    uploadedAt: new Date().toISOString()
                  };
                  map[projectName] = areaList;
                  localStorage.setItem('kans_project_areas', JSON.stringify(map));
                  fileInput.value = '';
                  updateAreaDocumentsDisplay();
                  alert(`${docType} berhasil diupload`);
                };
                reader.readAsDataURL(file);
              });
            });

            // Add choose file handlers
            docsGrid.querySelectorAll('.choose-file-btn').forEach(btn => {
              btn.addEventListener('click', function(e){
                e.preventDefault();
                const docType = this.getAttribute('data-doctype');
                const fileInput = document.getElementById(`file-${docType}`);
                fileInput.click();
              });
            });
          }

          function updateAreaDocumentsDisplay(){
            const documentTypes = ['PO', 'Invoice', 'Surat Jalan', 'BAPP', 'BASTB', 'Dokumentasi'];
            documentTypes.forEach(docType => {
              const listDiv = document.getElementById(`doc-list-${docType}`);
              if(areaObj.areaDocuments && areaObj.areaDocuments[docType]){
                const doc = areaObj.areaDocuments[docType];
                const fileName = doc.name.length > 20 ? doc.name.substring(0, 17) + '...' : doc.name;
                const downloadLink = `<a href="${doc.data}" download="${doc.name}" style="color:#27ae60; text-decoration:none; cursor:pointer; font-weight:bold;">✓ ${fileName}</a>`;
                const deleteBtn = isAdminUser() ? `<button type="button" class="delete-doc-btn" data-doctype="${docType}" style="background:#e74c3c; border:none; color:#fff; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:10px; font-weight:bold; margin-left:auto; line-height:1.4;">Hapus</button>` : '';
                listDiv.innerHTML = `<div style="display:flex; align-items:center; gap:8px; width:100%;">${downloadLink}${deleteBtn}</div>`;
              } else {
                listDiv.innerHTML = '<span style="color:#999;">Belum ada dokumen</span>';
              }
            });

            // Add delete handlers
            docsGrid.querySelectorAll('.delete-doc-btn').forEach(btn => {
              btn.addEventListener('click', function(e){
                e.preventDefault();
                if(!isAdminUser()){ alert('Akses ditolak'); return; }
                const docType = this.getAttribute('data-doctype');
                if(!confirm('Hapus dokumen ini?')) return;
                
                delete areaObj.areaDocuments[docType];
                map[projectName] = areaList;
                localStorage.setItem('kans_project_areas', JSON.stringify(map));
                updateAreaDocumentsDisplay();
                alert(`${docType} berhasil dihapus`);
              });
            });
          }
          window.updateAreaDocumentsDisplay = updateAreaDocumentsDisplay;

          if(docsAreaBtn){
            docsAreaBtn.addEventListener('click', function(){
              buildDocumentsGrid();
              updateAreaDocumentsDisplay();
              openModal(docsModal);
            });
          }

          if(closeDocsBtn) closeDocsBtn.addEventListener('click', function(){ closeModal(docsModal); });
          if(docsModal) docsModal.addEventListener('click', function(e){ if(e.target===docsModal) closeModal(docsModal); });
        })();
      }
    }

    // Area menu toggle (dropdown)
    (function setupAreaMenu(){
      const menuBtn = document.getElementById('area-menu-btn');
      const menuEl = document.getElementById('area-menu');
      function closeMenu(){ if(menuEl){ menuEl.style.display='none'; menuBtn && menuBtn.setAttribute('aria-expanded','false'); } }
      function openMenu(){ if(menuEl){ menuEl.style.display='block'; menuBtn && menuBtn.setAttribute('aria-expanded','true'); } }
      if(menuBtn){
        menuBtn.addEventListener('click', function(e){ e.stopPropagation(); if(!menuEl) return; if(menuEl.style.display==='block') closeMenu(); else openMenu(); });
      }
      document.addEventListener('click', function(){ closeMenu(); });
      document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });
      // close menu when edit/delete clicked
      const editBtn = document.getElementById('edit-area-btn');
      const deleteBtn = document.getElementById('delete-area-btn');
      if(editBtn) editBtn.addEventListener('click', function(){ closeMenu(); });
      if(deleteBtn) deleteBtn.addEventListener('click', function(){ closeMenu(); });
    })();
  </script>
</body>
</html>
